name: Upload DSG assets to S3

on:
  push:
    branches:
      - main

jobs:
  upload-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload assets to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          echo "Uploading DSG assets to S3 bucket: $S3_BUCKET"

          aws s3 cp dsg-cookie.js s3://$S3_BUCKET/dsg-cookie.js --cache-control "no-store"
          aws s3 cp dsg-cookie.css s3://$S3_BUCKET/dsg-cookie.css --cache-control "no-store"

          aws s3 cp Banner/renderDCB.js s3://$S3_BUCKET/Banner/renderDCB.js --cache-control "no-store"
          aws s3 cp Banner/renderDCB.css s3://$S3_BUCKET/Banner/renderDCB.css --cache-control "no-store"

